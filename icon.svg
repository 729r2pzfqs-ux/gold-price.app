<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE55C"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#DAA520"/>
    </linearGradient>
    <linearGradient id="goldLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#CD853F"/>
    </linearGradient>
    <linearGradient id="goldRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DAA520"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
  </defs>
  <!-- Gold bar - trapezoid top -->
  <polygon points="25,35 75,35 85,55 15,55" fill="url(#goldTop)" stroke="#8B7500" stroke-width="1"/>
  <!-- Gold bar - left face -->
  <polygon points="15,55 25,35 25,65 15,85" fill="url(#goldLeft)" stroke="#8B7500" stroke-width="1"/>
  <!-- Gold bar - front face -->
  <polygon points="15,85 25,65 75,65 85,85" fill="url(#goldTop)" stroke="#8B7500" stroke-width="1"/>
  <!-- Gold bar - right face -->
  <polygon points="85,55 75,35 75,65 85,85" fill="url(#goldRight)" stroke="#8B7500" stroke-width="1"/>
  <!-- Shine highlight -->
  <polygon points="30,38 55,38 60,50 25,50" fill="rgba(255,255,255,0.3)"/>
</svg>
